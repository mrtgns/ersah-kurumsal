backend:
  name: github
  repo: senin-github-kullanici-adin/ersah-kurumsal # BURAYI GÜNCELLE
  branch: main # Kullandığın ana dal

media_folder: "public/img/products" # Resimlerin yükleneceği yer
public_folder: "/img/products"

collections:
  - name: "urunler"
    label: "Ürünler"
    folder: "src/content/products" # Her ürün burada bir JSON dosyası olacak
    create: true # Yeni ürün eklenebilir
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Ürün Adı", name: "title", widget: "string" }
      - { label: "URL Uzantısı (Slug)", name: "slug", widget: "string" }
      - { 
          label: "Kategori", 
          name: "category", 
          widget: "select", 
          options: ["is-montlari", "is-polarlari", "is-pantolonlari", "tshirt-sweat"] 
        }
      - { label: "Ürün Görseli", name: "image", widget: "image" }
      - { label: "Ürün Açıklaması", name: "description", widget: "text" }
      - { label: "Yayın Tarihi", name: "date", widget: "datetime" }